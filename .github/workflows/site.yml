name: Site

# Build the umbrella MkDocs (Material) site — the suite's front door: the design docs + the
# install/deployment guide, with links out to each submodule's Doxygen API site — and publish it to
# this repo's GitHub Pages. Requires Pages enabled with "Source: GitHub Actions" (Settings -> Pages).

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install MkDocs Material
        run: pip install -r requirements-docs.txt
      - name: Build site (strict — fail on broken links/nav)
        run: mkdocs build --strict --site-dir site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
