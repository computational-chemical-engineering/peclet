site_name: Peclet
site_description: GPU-accelerated & parallel simulation of transport phenomena (CFD, DEM, Voronoi)
repo_url: https://github.com/computational-chemical-engineering/peclet
repo_name: peclet
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details

# Reuse the in-repo design docs as the single source of truth (also rendered on GitHub).
# The API references live on each submodule's own Doxygen Pages site (external links).
nav:
  - Home: index.md
  - Install & run: DEPLOYMENT.md
  - Containers (HPC): containers.md
  - Python API:
      - Overview: python/index.md
      - peclet.flow: python/flow.md
      - peclet.dem: python/dem.md
      - peclet.voro: python/voro.md
      - peclet.core: python/core.md
      - peclet.morton: python/morton.md
  - Design:
      - Architecture: ARCHITECTURE.md
      - Conventions: CONVENTIONS.md
      - Interfaces: INTERFACES.md
      - Style: STYLE.md
      - Portability: PORTABILITY.md
      - Roadmap: ROADMAP.md
  - Studies:
      - Staggered vs collocated (flow): studies/staggered_vs_colocated.md
  - C++ API (Doxygen):
      - peclet-core: https://computational-chemical-engineering.github.io/peclet-core/
      - peclet-morton: https://computational-chemical-engineering.github.io/peclet-morton/
      - peclet-flow: https://computational-chemical-engineering.github.io/peclet-flow/
      - peclet-dem: https://computational-chemical-engineering.github.io/peclet-dem/
      - peclet-voro: https://computational-chemical-engineering.github.io/peclet-voro/

# DOC_CI_WORK_NOTES.md is an internal work log; keep it out of the nav.
not_in_nav: |
  DOC_CI_WORK_NOTES.md
